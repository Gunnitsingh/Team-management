<div *ngIf="tasksByStatus$ | async as grouped">

  <div style="display: flex; gap: 16px;">

    <div *ngFor="let column of columns" cdkDropList [cdkDropListData]="grouped[column]"
      [cdkDropListConnectedTo]="columns" [id]="column" (cdkDropListDropped)="drop($event)"
      style="flex: 1; border: 1px solid #ccc; padding: 10px;">

      <h3>{{ column }}</h3>

      <div *ngFor="let task of grouped[column]" cdkDrag
        style="background: #f5f5f5; margin-bottom: 10px; padding: 8px; border-radius: 4px;">

        <strong>{{ task.title }}</strong>
        <div>{{ task.assignedToName }}</div>
        <div>{{ task.priority }}</div>
        <div>{{ task.description }}</div>

      </div>

    </div>

  </div>

</div>
<ng-template #loading>
  <div>Loading...</div>
</ng-template>
