<form action="" [formGroup]="taskForm" class="form-style">
    <h1 style="text-align: center;">{{data.title }} Task </h1>
    <div>
        <!-- <label for="title"></label>
    <input type="text" id="title" name="title"  [(ngModel)]="taskForm.value.title"> -->
        <mat-form-field class="example-full-width">
            <mat-label>Title</mat-label>
            <input matInput value="title" [formControlName]="'title'">
        </mat-form-field>
    </div>
    <div>
        <mat-form-field class="example-full-width">
            <mat-label>Description</mat-label>
            <textarea matInput [formControlName]="'description'"></textarea>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field class="select-field">

            <mat-label>Priority</mat-label>
            <mat-select [formControlName]="'priority'">
                @for (priority of priorities; track priorities) {
                <mat-option [value]="priority">{{priority}}</mat-option>
                }
            </mat-select>
        </mat-form-field>
        <mat-form-field class="select-field assignto-field">

            <mat-label>Assigned To</mat-label>
            <mat-select [formControlName]="'assignedTo'">
                @for (user of data.users | async; track user.id) {
                <mat-option [value]="user.id">{{user.name}}</mat-option>
                }
            </mat-select>
        </mat-form-field>
    </div>
    <div>
        <mat-form-field>
            <mat-label>Due Date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="dueDate"> 
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker">
            </mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

    </div>
    <mat-dialog-actions align="end">
        <button matButton mat-dialog-close>Cancel</button>
        <button matButton [mat-dialog-close]="formData().value" cdkFocusInitial [disabled]="!taskForm.valid">{{data.title }}
            Task</button>
    </mat-dialog-actions>

</form>
