<div class="timeline">
   
  <div *ngFor="let activity of taskActivities$ | async" class="timeline-item">
    
    <div class="timeline-icon">
      <mat-icon>{{ getIcon(activity.eventType) }}</mat-icon>
    </div>

    <div class="timeline-content">
      <div class="description">
        {{ activity.description }}
      </div>

      <div class="time">
        {{ activity.createdAt | date:'medium' }}
      </div>
    </div>

  </div>
</div>
